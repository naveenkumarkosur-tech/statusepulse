name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  build-and-push:
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name and tags
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${REPO_LC}"
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "image-tag=${IMAGE}:${SHORT}" >> $GITHUB_OUTPUT
          echo "Will tag as: ${IMAGE}:${SHORT} and ${IMAGE}:latest"

      - name: Build and push image to ghcr.io
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Notify success via GitHub Issue comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const image = '${{ steps.meta.outputs.image }}';
            const body = `Deployment build succeeded for commit \`${sha}\`.\n\nImage pushed to:\n- \`${image}:${{ github.sha }}\`\n- \`${image}:latest\`\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy succeeded: ${sha}`,
              body: body,
              labels: ['deployment', 'success']
            });

      - name: Notify failure via GitHub Issue comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const body = `Deployment build FAILED for commit \`${sha}\`.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy FAILED: ${sha}`,
              body: body,
              labels: ['deployment', 'failure']
            });
OUTERcat > .github/workflows/deploy.yml << 'OUTER'
