name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: ruff check app/

      - name: Lint Dockerfile (warnings allowed)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Create env file
        run: |
          {
            echo "DB_HOST=db"
            echo "DB_PORT=5432"
            echo "DB_NAME=statuspulse"
            echo "DB_USER=statuspulse"
            echo "DB_PASSWORD=ci_test_password"
            echo "REDIS_HOST=redis"
            echo "REDIS_PORT=6379"
            echo "REDIS_PASSWORD=ci_redis_password"
            echo "APP_PORT=8000"
          } > .env

      - name: Build Docker image
        run: docker build -t statuspulse:ci .

      - name: Start full stack
        run: docker compose up -d --build

      - name: Show containers
        run: docker compose ps

      - name: Wait for app health endpoint
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1; then
              echo "App is healthy after $i attempts"
              curl -s http://localhost:8000/health
              echo ""
              exit 0
            fi
            echo "Attempt $i: app not ready, waiting..."
            sleep 5
          done
          echo "===== APP NEVER BECAME HEALTHY ====="
          docker compose ps
          echo "===== APP LOGS ====="
          docker compose logs app --tail 200
          echo "===== DB LOGS ====="
          docker compose logs db --tail 50
          exit 1

      - name: Run integration tests
        run: |
          chmod +x tests/test_integration.sh
          ./tests/test_integration.sh http://localhost:8000 | tee test-results.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results.txt
          if-no-files-found: ignore

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs app --tail 200 || true
          docker compose logs db --tail 50 || true
          docker compose logs redis --tail 50 || true

      - name: Tear down
        if: always()
        run: docker compose down -v || true
