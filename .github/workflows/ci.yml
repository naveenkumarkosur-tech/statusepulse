name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: ruff check app/

      - name: Lint Dockerfile (warnings only, do not fail build)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          no-fail: false

      - name: Create env file
        run: |
          {
            echo "DB_HOST=db"
            echo "DB_PORT=5432"
            echo "DB_NAME=statuspulse"
            echo "DB_USER=statuspulse"
            echo "DB_PASSWORD=ci_test_password"
            echo "REDIS_HOST=redis"
            echo "REDIS_PORT=6379"
            echo "REDIS_PASSWORD=ci_redis_password"
            echo "APP_PORT=8000"
          } > .env

      - name: Build Docker image
        run: docker build -t statuspulse:ci .

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' statuspulse-app-1 2>/dev/null || echo "starting")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs app --tail 80
          exit 1

      - name: Run integration tests
        run: |
          chmod +x tests/test_integration.sh
          docker run --rm --network statuspulse_statusnet -v ${{ github.workspace }}/tests:/tests curlimages/curl:latest sh /tests/test_integration.sh http://app:8000 | tee test-results.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results.txt

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs app --tail 100 || true
          docker compose logs db --tail 50 || true

      - name: Tear down
        if: always()
        run: docker compose down -v || true
